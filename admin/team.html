    <main class="admin-main">

            </div>

        </div>

    <!-- TEAM MEMBER MODAL -->
    <div class="modal" id="teamModal">
        <div class="modal-overlay" onclick="closeTeamModal()"></div>
        <div class="modal-content modal-medium">
            <div class="modal-header">
                <h2 id="modalTitle">Add Team Member</h2>
                <button class="modal-close" onclick="closeTeamModal()" title="Close modal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            
            <form id="teamForm" class="modal-body">
                <input type="hidden" id="memberId">
                
                <div class="form-group">
                    <label for="memberName">Full Name *</label>
                    <input type="text" id="memberName" required>
                </div>
                
                <div class="form-group">
                    <label for="memberDesignation">Designation *</label>
                    <input type="text" id="memberDesignation" placeholder="e.g., CEO & Founder" required>
                </div>
                
                <div class="form-group">
                    <label for="memberRole">Role *</label>
                    <select id="memberRole" required>
                        <option value="member">Member</option>
                        <option value="ceo">CEO</option>
                        <option value="cto">CTO</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="memberBio">Bio *</label>
                    <textarea id="memberBio" rows="3" maxlength="300" required></textarea>
                    <span class="char-count"><span id="bioCount">0</span>/300</span>
                </div>
                
                <div class="form-group">
                    <label for="memberExpertise">Expertise (comma-separated)</label>
                    <input type="text" id="memberExpertise" placeholder="e.g., PCB Design, Embedded Systems">
                </div>
                
                <div class="form-group">
                    <label for="memberEmail">Email</label>
                    <input type="email" id="memberEmail">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="memberReceiveQuotes">
                        <span>Receive Quote Request Notifications</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label>Social Links</label>
                    <div class="social-inputs">
                        <input type="url" id="memberLinkedin" placeholder="LinkedIn URL">
                        <input type="url" id="memberGithub" placeholder="GitHub URL">
                        <input type="url" id="memberTwitter" placeholder="Twitter URL">
                        <input type="url" id="memberWebsite" placeholder="Website URL">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="memberStatus">Status *</label>
                        <select id="memberStatus" required>
                            <option value="Active">Active</option>
                            <option value="Alumni">Alumni</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="memberOrder">Display Order *</label>
                        <input type="number" id="memberOrder" min="1" value="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="memberPhoto">Profile Photo *</label>
                    <input type="file" id="memberPhoto" accept="image/*">
                    <div id="photoPreview" class="image-preview"></div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeTeamModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveMemberBtn">
                        <span class="btn-text">Save Member</span>
                        <span class="btn-loading is-hidden">Saving...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div class="modal" id="deleteModal">
        <div class="modal-overlay" onclick="closeDeleteModal()"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" onclick="closeDeleteModal()" title="Close modal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to remove this team member? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
