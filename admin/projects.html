    <!-- ADMIN MAIN CONTENT -->
    <main class="admin-main">
        
        <!-- TOP BAR -->
        <header class="admin-header">
            <button class="mobile-menu-toggle" id="mobileMenuToggle" title="Toggle navigation menu" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <h1 class="page-title">Manage Projects</h1>
            
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openProjectModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Project
                </button>
            </div>
        </header>

        <!-- PROJECTS CONTENT -->
        <div class="admin-content">
            
            <!-- FILTERS -->
            <div class="content-filters">
                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" placeholder="Search projects..." id="searchProjects">
                </div>
                
                <select id="filterCategory" class="filter-select" title="Filter by category">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Software">Software</option>
                    <option value="Embedded Systems">Embedded Systems</option>
                </select>
                
                <select id="filterStatus" class="filter-select" title="Filter by status">
                    <option value="">All Status</option>
                    <option value="Completed">Completed</option>
                    <option value="Ongoing">Ongoing</option>
                </select>
            </div>

            <!-- PROJECTS TABLE -->
            <div class="data-card">
                <div class="table-container">
                    <table class="data-table" id="projectsTable">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Client</th>
                                <th>Featured</th>
                                <th>Order</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="8" class="loading-cell">Loading projects...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- PROJECT MODAL -->
    <div class="modal" id="projectModal">
        <div class="modal-overlay" onclick="closeProjectModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Project</h2>
                <button class="modal-close" onclick="closeProjectModal()" title="Close modal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            
            <form id="projectForm" class="modal-body">
                <input type="hidden" id="projectId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="projectTitle">Project Title *</label>
                        <input type="text" id="projectTitle" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectCategory">Category *</label>
                        <select id="projectCategory" required>
                            <option value="">Select category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Software">Software</option>
                            <option value="Embedded Systems">Embedded Systems</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="projectShortDesc">Short Description *</label>
                    <textarea id="projectShortDesc" rows="2" maxlength="150" required></textarea>
                    <span class="char-count"><span id="shortDescCount">0</span>/150</span>
                </div>
                
                <div class="form-group">
                    <label for="projectFullDesc">Full Description *</label>
                    <textarea id="projectFullDesc" rows="6" required></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="projectClient">Client Name</label>
                        <input type="text" id="projectClient" placeholder="e.g., Acme Corp or Confidential">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectDuration">Duration</label>
                        <input type="text" id="projectDuration" placeholder="e.g., 3 months">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="projectStatus">Status *</label>
                        <select id="projectStatus" required>
                            <option value="Completed">Completed</option>
                            <option value="Ongoing">Ongoing</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectOrder">Display Order *</label>
                        <input type="number" id="projectOrder" min="1" value="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="projectTechnologies">Technologies (comma-separated)</label>
                    <input type="text" id="projectTechnologies" placeholder="e.g., Python, CAD, Altium">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="projectFeatured">
                        <span>Featured on Homepage</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label for="projectThumbnail">Thumbnail Image *</label>
                    <input type="file" id="projectThumbnail" accept="image/*">
                    <div id="thumbnailPreview" class="image-preview"></div>
                </div>
                
                <div class="form-group">
                    <label for="projectGallery">Gallery Images (Optional)</label>
                    <input type="file" id="projectGallery" accept="image/*" multiple>
                    <div id="galleryPreview" class="image-preview-grid"></div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveProjectBtn">
                        <span class="btn-text">Save Project</span>
                        <span class="btn-loading is-hidden">Saving...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div class="modal" id="deleteModal">
        <div class="modal-overlay" onclick="closeDeleteModal()"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" onclick="closeDeleteModal()" title="Close modal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this project? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
